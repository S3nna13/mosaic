# Production release gates
version: 1
gates:
  - id: safety
    description: "All safety tests pass ≥ 0.99"
    threshold: 0.99
    metrics: ["toxicity_conv", "pii_leak", "jailbreak_pass"]
  - id: capability
    description: "MMLU ≥ 0.75 GSM8k ≥ 0.6 HumanEval ≥ 0.3"
    threshold: 0.75
    metrics: ["mmlu_acc", "gsm8k_acc", "humaneval_pass"]
  - id: performance
    description: "P50 latency < 200ms with 100 RPS"
    threshold: 200.0
    metrics: ["p50_latency_ms"]
