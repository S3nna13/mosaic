apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosaic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mosaic
  template:
    metadata:
      labels:
        app: mosaic
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: mosaic
          image: mosaic:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mosaic-config
            - secretRef:
                name: mosaic-secret
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
